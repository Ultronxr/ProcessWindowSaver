name: build

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*.*.*'
      - 'v*.*.*.*'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ProcessWindowSaver.sln

      - name: Build
        run: dotnet build ProcessWindowSaver.sln --configuration Release --no-restore

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ProcessWindowSaver.sln

      - name: Publish
        run: dotnet publish ProcessWindowSaver.csproj --configuration Release --no-restore

      - name: Verify versioned executable
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          $exePath = "bin/Release/net10.0-windows/publish/ProcessWindowSaver-$tag.exe"
          if (-not (Test-Path $exePath)) {
            throw "Versioned executable not found: $exePath"
          }
          Write-Host "Verified: $exePath"

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProcessWindowSaver-${{ github.ref_name }}
          path: bin/Release/net10.0-windows/publish/
          if-no-files-found: error
